<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Leitura com IA</title>
  <link rel="stylesheet" href="./css/travalingua.css">
</head>

<body>

<header class="topbar">
  <h1>FonemaViva</h1>
  <span class="sub">Treino de Pronúncia - Trava Língua</span>
</header>

<div class="container">

  <!-- 🔥 BARRA DE PROGRESSO -->
  <div class="progresso-container">
    <div class="progresso-barra">
      <div id="progresso"></div>
    </div>
    <span id="progresso-texto">0%</span>
  </div>

<div class="container">

  <div class="card">
    <p class="instrucao">Leia a frase em voz alta:</p>

    <h2 id="frase"></h2>

    <button id="gravar" class="btn-mic">🎤 Falar</button>

    <div class="resposta">
      <span>Você disse:</span>
      <strong id="resultado">...</strong>
    </div>

    <div id="feedback"></div>
  </div>

  <!-- 🔥 FORA DO CARD -->
  <div class="nav-botoes">
    <button id="anterior" class="btn-next">⬅ Anterior</button>
    <button id="proximo" class="btn-next">Próximo ➡</button>
  </div>

</div>

<script src="./js/travalingua.js"></script>

</body>
</html>
