<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>FonemaViva - Login</title>
    <link rel="stylesheet" href="./Css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
</head>
<body>

<header class="header-titulo">
    FonemaViva
</header>

<div class="layout">

    <!-- LADO ESQUERDO -->
    <div class="left-side">
        <div class="left-content">
            <h1>Bem-vindo de volta</h1>
            <p>
                Acesse sua conta e continue evoluindo sua comunicação
                com nossas ferramentas inteligentes.
            </p>
        </div>
    </div>

    <!-- LADO DIREITO -->
    <div class="right-side">
        <div class="card">

            <h2>Entrar</h2>

            <form id="formLogin">

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Digite seu email" required>
                </div>

                <div class="input-group">
                    <label>Senha</label>
                    <div class="senha-container">
                        <input type="password" id="senha" minlength="8" maxlength="8" placeholder="••••••••" required>
                        <span class="material-symbols-outlined toggle-senha"
                              onclick="toggleSenha('senha', this)">
                            visibility
                        </span>
                    </div>
                </div>

                <div class="options">
                    <label class="lembrar">
                        <input type="checkbox" id="lembrar">
                        Lembrar-me
                    </label>
                </div>

                <button type="submit">Logar</button>

                <p class="cadastro-texto">
                    Não tem conta?
                    <a href="./cadastro.html">Criar agora</a>
                </p>

            </form>
        </div>
    </div>

</div>

<script src="./js/login.js"></script>
</body>
</html>
